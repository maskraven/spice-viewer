# Build product packages on native runners (CGO / Fyne / OS codecs).
# Trigger: push of version tags (v*) or manual workflow_dispatch.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version stamp (e.g. v0.2.0-dev); defaults to tag or snapshot"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  linux:
    name: Linux packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Install Fyne / OpenGL build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev libwayland-dev \
            libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          install-only: true

      - name: Build (snapshot or release)
        env:
          CGO_ENABLED: "1"
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            goreleaser release --clean --skip=publish
          else
            goreleaser release --snapshot --clean --skip=publish
          fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/checksums.txt
          if-no-files-found: warn

  macos:
    name: macOS app + dmg
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Build product (.app, .dmg, zip)
        env:
          CGO_ENABLED: "1"
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          chmod +x scripts/macos/*.sh
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            export VERSION="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            export VERSION="${{ inputs.version }}"
          else
            export VERSION="0.0.0-snapshot"
          fi
          ./scripts/macos/build-product.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: |
            dist/macos/*.dmg
            dist/macos/*-macos-app.zip
          if-no-files-found: error

  windows:
    name: Windows exe + zip (+ NSIS)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Install MinGW (cgo)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config

      - name: Install NSIS
        run: choco install nsis -y
        continue-on-error: true

      - name: Build product
        shell: pwsh
        env:
          CGO_ENABLED: "1"
        run: |
          $env:Path = "C:\msys64\mingw64\bin;" + $env:Path
          if ("${{ github.ref_type }}" -eq "tag") {
            $ver = $env:GITHUB_REF_NAME
          } elseif ("${{ inputs.version }}" -ne "") {
            $ver = "${{ inputs.version }}"
          } else {
            $ver = "0.0.0-snapshot"
          }
          .\scripts\windows\build-product.ps1 -Version $ver

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            dist/windows/*.zip
            dist/windows/*.exe
          if-no-files-found: error

  publish:
    name: Attach to GitHub Release
    needs: [linux, macos, windows]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' -o -name '*.exe' -o -name 'checksums.txt' \) \
            -exec cp -v {} release-assets/ \;
          (cd release-assets && sha256sum * > checksums-all.txt || shasum -a 256 * > checksums-all.txt)
          ls -la release-assets

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
